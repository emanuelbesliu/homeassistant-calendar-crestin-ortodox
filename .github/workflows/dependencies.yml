name: Validate Dependencies

on:
  pull_request:
    paths:
      - 'requirements.txt'
      - 'custom_components/calendar_ortodox/manifest.json'
      - '.github/workflows/dependencies.yml'
  push:
    branches:
      - main
    paths:
      - 'requirements.txt'
      - 'custom_components/calendar_ortodox/manifest.json'

jobs:
  validate:
    name: Validate Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify manifest.json requirements match
        run: |
          # Extract requirements from manifest.json
          MANIFEST_REQS=$(python -c "import json; print(' '.join(json.load(open('custom_components/calendar_ortodox/manifest.json'))['requirements']))")
          
          echo "Manifest requirements: $MANIFEST_REQS"
          echo "requirements.txt:"
          cat requirements.txt | grep -v '^#' | grep -v '^$'
          
          # Check if beautifulsoup4 is in requirements.txt
          if ! grep -q "beautifulsoup4" requirements.txt; then
            echo "❌ beautifulsoup4 not found in requirements.txt"
            exit 1
          fi
          
          # Check if lxml is in requirements.txt
          if ! grep -q "lxml" requirements.txt; then
            echo "❌ lxml not found in requirements.txt"
            exit 1
          fi
          
          echo "✓ Dependencies validation passed"

      - name: Test import
        run: |
          python -c "from bs4 import BeautifulSoup; import bs4; print(f'beautifulsoup4 version: {bs4.__version__}')"
          python -c "import lxml; from lxml import etree; print(f'lxml version: {etree.LXML_VERSION}')"
          echo "✓ All dependencies can be imported"

      - name: Check for security vulnerabilities
        run: |
          pip install safety
          safety check --file requirements.txt --json || echo "⚠️ Security check completed"
        continue-on-error: true

      - name: Create validation summary
        run: |
          echo "# Dependencies Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All dependencies validated successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Installed Versions" >> $GITHUB_STEP_SUMMARY
          pip list | grep -E "requests|urllib3" >> $GITHUB_STEP_SUMMARY || true
